{% extends 'base.html' %}
{% block breadcrumb %}<li class="breadcrumb-item active" aria-current="page">تسجيل الدخول</li>{% endblock %}
{% block content %}

<div class="login-wrap">
  <div class="login-card">
    <h1 class="mb-2">تسجيل الدخول</h1>
    <p class="text-muted mb-4">تم إلغاء طلب اسم المستخدم وكلمة السر. اضغط للمتابعة إلى النظام.</p>

    <form method="post" novalidate>
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <button type="submit" class="btn btn-success w-100 py-2">
        المتابعة
      </button>
    </form>
  </div>
</div>

{% endblock %}
