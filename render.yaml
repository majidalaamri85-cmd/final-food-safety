services:
  - type: web
    name: food-safety-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt; python manage.py collectstatic --noinput; python manage.py migrate
    startCommand: gunicorn food_safety_system.wsgi:application
    autoDeploy: true
    disks:
      - name: media-disk
        mountPath: /var/data
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: food-safety-system.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://food-safety-system.onrender.com
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: DATABASE_URL
        fromDatabase:
          name: food-safety-db
          property: connectionString

  - type: pserv
    name: food-safety-db
    plan: free
    ipAllowList: []
